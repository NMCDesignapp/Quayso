<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quay Số May Mắn</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{
  --bg:#0a0f1e;--bg2:#111827;--card:#1e293b;--card2:#273449;
  --border:#334155;--gold:#d4a843;--gold-light:#f5d870;--gold-dark:#a07828;
  --accent:#ffe066;--fg:#f0f4f8;--fg-muted:#8899aa;
  --danger:#e84057;--success:#3dd68c;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--fg);height:100vh;overflow:hidden}

.bg-effects{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-effects .orb{position:absolute;border-radius:50%;filter:blur(160px);animation:orbFloat 14s ease-in-out infinite alternate}
.bg-effects .orb:nth-child(1){width:700px;height:700px;background:radial-gradient(circle,rgba(245,216,112,.16),rgba(212,168,67,.06));top:-200px;right:-150px;opacity:1}
.bg-effects .orb:nth-child(2){width:600px;height:600px;background:radial-gradient(circle,rgba(30,58,138,.2),rgba(15,23,42,.08));bottom:-200px;left:-150px;opacity:1;animation-delay:-4s;animation-duration:16s}
.bg-effects .orb:nth-child(3){width:500px;height:500px;background:radial-gradient(circle,rgba(245,216,112,.1),rgba(30,64,175,.06));top:30%;left:40%;opacity:1;animation-delay:-8s;animation-duration:20s}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,-25px) scale(1.1)}}

body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(30,58,138,.1) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 30%,rgba(245,216,112,.06) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 90%,rgba(15,23,42,.1) 0%,transparent 50%),
    linear-gradient(180deg,#0a0f1e 0%,#0e1529 30%,#0a0f1e 70%,#070b16 100%);
}

.app{position:relative;z-index:1;display:grid;grid-template-columns:310px 1fr;height:100vh;overflow:hidden}

.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.sidebar-top{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-top h1{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;background:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px}
.gear-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--fg-muted);width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .2s}
.gear-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(212,168,67,.08)}
.panel-section{display:flex;flex-direction:column;min-height:0;overflow:hidden}
.panel-section+.panel-section{border-top:1px solid var(--border)}
.panel-header{padding:10px 14px 6px;flex-shrink:0}
.panel-header h2{font-size:.9rem;font-weight:600;color:var(--gold-light);display:flex;align-items:center;gap:7px;letter-spacing:.5px}
.panel-header h2 i{font-size:.82rem}

.prize-list-wrap{flex-shrink:0;max-height:110px;overflow-y:auto;padding:2px 8px}
.prize-list-wrap::-webkit-scrollbar{width:3px}
.prize-list-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.list-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;transition:all .2s;cursor:default}
.list-item:hover{background:var(--card)}
.list-item .item-num{width:24px;height:24px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:.66rem;font-weight:600;color:var(--gold);flex-shrink:0}
.list-item .item-name{flex:1;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item .item-qty{font-size:.72rem;color:var(--gold);background:var(--card2);padding:2px 8px;border-radius:10px;flex-shrink:0}
.list-item.won{opacity:.3;text-decoration:line-through}
.list-item.won .item-num{background:var(--success);color:var(--bg)}
.prize-item .item-num{background:linear-gradient(135deg,var(--gold-dark),var(--gold)) !important;color:var(--bg) !important}
.prize-item .item-name{font-weight:500}
.prize-item.selected-prize{background:rgba(212,168,67,.12) !important;border-left:3px solid var(--gold)}
.panel-count{padding:7px 14px;border-top:1px solid var(--border);font-size:.74rem;color:var(--fg-muted);display:flex;justify-content:space-between;flex-shrink:0}
.panel-count .cnt{color:var(--gold);font-weight:600}

.customer-section{flex:1;min-height:0;display:flex;flex-direction:column}
.customer-scroll-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
.customer-scroll-wrap::before,.customer-scroll-wrap::after{content:'';position:absolute;left:0;right:0;z-index:5;pointer-events:none}
.customer-scroll-wrap::before{top:0;height:30px;background:linear-gradient(180deg,var(--bg2),transparent)}
.customer-scroll-wrap::after{bottom:0;height:30px;background:linear-gradient(0deg,var(--bg2),transparent)}
.customer-scroll-wrap:hover .customer-scroll-track{animation-play-state:paused !important}
.customer-scroll-track{will-change:transform}
.cs-item{display:flex;align-items:center;gap:8px;padding:8px 10px;transition:background .3s}
.cs-item .cs-num{width:26px;height:26px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:600;color:var(--gold);flex-shrink:0}
.cs-item .cs-name{flex:1;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:rgba(240,244,248,.7)}
.cs-item.winner-flash{background:rgba(212,168,67,.18) !important}
.cs-item.winner-flash .cs-name{color:var(--gold-light);font-weight:600}
.cs-item.winner-flash .cs-num{background:var(--gold);color:var(--bg)}

.main-area{display:flex;flex-direction:column;height:100vh;padding:24px 32px 18px;overflow:hidden}

.main-title-top{
  font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:900;
  text-align:center;margin-bottom:10px;letter-spacing:6px;text-transform:uppercase;
  background:linear-gradient(135deg,var(--accent),var(--gold-light),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  flex-shrink:0;filter:drop-shadow(0 0 30px rgba(245,216,112,.15));
}

.draw-stage{width:100%;max-width:720px;margin:12px auto 0;flex-shrink:0}
.slot-machine{
  position:relative;overflow:hidden;border-radius:22px;
  background:linear-gradient(180deg,#1a2744,#121d36,#0e1628,#0a1020);
  border:2px solid #2d4a7a;border-top-color:#3a5a8a;border-left-color:#345080;border-right-color:#284070;border-bottom-color:#1e3060;
  box-shadow:0 1px 0 rgba(255,255,255,.06),0 2px 0 rgba(0,0,0,.3),0 4px 0 rgba(0,0,0,.2),0 8px 30px rgba(0,0,0,.4),0 0 60px rgba(30,58,138,.1),inset 0 2px 6px rgba(255,255,255,.05),inset 0 -4px 12px rgba(0,0,0,.5),inset 3px 0 8px rgba(0,0,0,.2),inset -3px 0 8px rgba(0,0,0,.2);
  transition:border-color .5s,box-shadow .5s;
}
.slot-machine::before{content:'';position:absolute;inset:5px;border-radius:18px;border:1px solid rgba(212,168,67,.08);pointer-events:none;z-index:5}
.slot-machine.spinning{border-color:var(--gold);box-shadow:0 2px 0 rgba(0,0,0,.3),0 4px 0 rgba(0,0,0,.2),0 8px 30px rgba(0,0,0,.4),0 0 80px rgba(245,216,112,.12),inset 0 2px 6px rgba(255,255,255,.05),inset 0 -4px 12px rgba(0,0,0,.5)}
.slot-machine.won{border-color:var(--accent);box-shadow:0 2px 0 rgba(0,0,0,.3),0 4px 0 rgba(0,0,0,.2),0 8px 30px rgba(0,0,0,.4),0 0 100px rgba(255,224,102,.2),inset 0 2px 6px rgba(255,255,255,.06),inset 0 -4px 12px rgba(0,0,0,.5)}

.machine-title{
  text-align:center;padding:12px 20px 6px;position:relative;z-index:2;
  font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--gold-light));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:5px;text-transform:uppercase;
}

.slot-viewport{
  position:relative;width:calc(100% - 40px);margin:0 20px;height:340px;overflow:hidden;border-radius:16px;
  background:radial-gradient(ellipse at center,#0e1628,#080e1e);
  border:1px solid rgba(45,74,122,.2);
  box-shadow:inset 0 8px 28px rgba(0,0,0,.8),inset 0 -8px 28px rgba(0,0,0,.5),inset 5px 0 18px rgba(0,0,0,.4),inset -5px 0 18px rgba(0,0,0,.4);
}

.slot-highlight{
  position:absolute;left:0;right:0;z-index:3;pointer-events:none;
  top:50%;transform:translateY(-50%);height:68px;
  border-top:2px solid rgba(245,216,112,.55);border-bottom:2px solid rgba(245,216,112,.55);
  background:linear-gradient(180deg,rgba(245,216,112,0),rgba(245,216,112,.08) 25%,rgba(245,216,112,.14) 50%,rgba(245,216,112,.08) 75%,rgba(245,216,112,0));
}
.slot-fade-top,.slot-fade-bottom{position:absolute;left:0;right:0;z-index:4;pointer-events:none}
.slot-fade-top{top:0;height:68px;background:linear-gradient(180deg,rgba(8,14,30,.98),rgba(8,14,30,.5) 50%,rgba(8,14,30,0))}
.slot-fade-bottom{bottom:0;height:68px;background:linear-gradient(0deg,rgba(8,14,30,.98),rgba(8,14,30,.5) 50%,rgba(8,14,30,0))}

.slot-track{position:absolute;left:0;right:0;top:0;will-change:transform;z-index:2}
.slot-item{height:68px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;white-space:nowrap;padding:0 24px}
.sz-center{font-size:2.3rem !important;color:var(--accent) !important;text-shadow:0 0 28px rgba(245,216,112,.45),0 2px 4px rgba(0,0,0,.5) !important}
.sz-1{font-size:1.2rem !important;color:rgba(240,244,248,.45) !important}
.sz-2{font-size:.9rem !important;color:rgba(240,244,248,.2) !important}
.sz-spin{font-size:1.5rem;color:rgba(240,244,248,.45)}
.slot-machine.won .sz-center{animation:winnerGlow 2s ease infinite}
@keyframes winnerGlow{0%,100%{text-shadow:0 0 20px rgba(245,216,112,.3),0 2px 4px rgba(0,0,0,.5)}50%{text-shadow:0 0 44px rgba(255,224,102,.7),0 0 80px rgba(245,216,112,.25),0 2px 4px rgba(0,0,0,.5)}}

.draw-btn-overlay{
  position:absolute;z-index:20;top:50%;left:0;transform:translateY(-50%);
  width:100%;height:68px;display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;
  background:linear-gradient(135deg,rgba(160,120,40,.94),rgba(212,168,67,.97),rgba(245,216,112,.94));
  color:#0a0f1e;border:none;border-radius:0;cursor:pointer;letter-spacing:5px;
  box-shadow:0 4px 28px rgba(212,168,67,.4);transition:opacity .5s ease,visibility .5s ease,background .3s;
}
.draw-btn-overlay:hover{background:linear-gradient(135deg,rgba(160,120,40,1),rgba(212,168,67,1),rgba(245,216,112,1));box-shadow:0 6px 36px rgba(245,216,112,.5)}
.draw-btn-overlay:disabled{opacity:.35;cursor:not-allowed}
.draw-btn-overlay.is-hidden{opacity:0 !important;visibility:hidden !important;pointer-events:none !important}

.machine-prize{text-align:center;padding:8px 20px 12px;position:relative;z-index:2;font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--gold-light);min-height:36px}

.results-section{flex:1;min-height:0;display:flex;flex-direction:column;margin-top:20px}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-shrink:0}
.results-header h3{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--gold-light);display:flex;align-items:center;gap:7px}
.results-header h3 i{font-size:.88rem}
.results-header button{background:none;border:1px solid var(--border);border-radius:6px;color:var(--fg-muted);font-size:.7rem;padding:4px 10px;cursor:pointer;transition:all .2s;font-family:inherit}
.results-header button:hover{border-color:var(--danger);color:var(--danger)}
.results-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;padding-right:3px;min-height:0}
.results-list::-webkit-scrollbar{width:3px}
.results-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.result-card{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 13px;animation:resultSlide .5s cubic-bezier(.22,1,.36,1);flex-shrink:0}
@keyframes resultSlide{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
.result-card .r-order{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--gold-dark),var(--gold));display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:var(--bg);flex-shrink:0}
.result-card .r-text{flex:1;font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-card .r-prize-inline{color:var(--gold-light);font-weight:500;margin-left:5px}

.confetti-canvas{position:fixed;inset:0;z-index:999;pointer-events:none}
.toast-container{position:fixed;top:14px;right:14px;z-index:1000;display:flex;flex-direction:column;gap:5px}
.toast{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:.82rem;color:var(--fg);box-shadow:0 6px 24px rgba(0,0,0,.3);animation:toastIn .4s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;gap:7px}
.toast.error{border-color:var(--danger)}.toast.error i{color:var(--danger)}
.toast.success{border-color:var(--success)}.toast.success i{color:var(--success)}
@keyframes toastIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:92%;max-width:500px;max-height:82vh;display:flex;flex-direction:column;animation:modalIn .3s cubic-bezier(.22,1,.36,1);box-shadow:0 16px 50px rgba(0,0,0,.5)}
@keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(16px)}to{opacity:1;transform:none}}
.modal-top{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-top h3{font-family:'Playfair Display',serif;color:var(--gold-light);font-size:1.05rem}
.modal-close{background:none;border:none;color:var(--fg-muted);font-size:1rem;cursor:pointer;padding:4px;transition:color .2s}
.modal-close:hover{color:var(--fg)}
.modal-tabs{display:flex;gap:0;padding:12px 20px 0;flex-shrink:0}
.modal-tab{flex:1;padding:9px;text-align:center;font-size:.82rem;font-weight:500;color:var(--fg-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none}
.modal-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.modal-tab:hover{color:var(--fg)}
.tab-content{display:none;padding:14px 20px;flex:1;overflow-y:auto;min-height:0}
.tab-content.active{display:flex;flex-direction:column;gap:10px}
.tab-content::-webkit-scrollbar{width:3px}
.tab-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.title-setting{display:flex;flex-direction:column;gap:6px;padding:12px 14px;background:var(--bg2);border-radius:8px;border:1px solid var(--border)}
.title-setting label{font-size:.78rem;color:var(--fg-muted);font-weight:500}
.title-setting input{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--fg);font-size:.88rem;font-family:inherit;outline:none;transition:border-color .2s}
.title-setting input:focus{border-color:var(--gold)}

.form-row{display:flex;gap:6px}
.form-row input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--fg);font-size:.82rem;font-family:inherit;outline:none;transition:border-color .2s;min-width:0}
.form-row input:focus{border-color:var(--gold)}
.form-row input::placeholder{color:var(--fg-muted)}
.form-row input.qty-input{width:60px;flex:none;text-align:center}
.form-row .add-btn{background:var(--gold-dark);color:var(--fg);border:none;border-radius:7px;width:36px;height:36px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.form-row .add-btn:hover{background:var(--gold);color:var(--bg)}
.settings-list{display:flex;flex-direction:column;gap:3px;max-height:180px;overflow-y:auto}
.settings-list::-webkit-scrollbar{width:3px}
.settings-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.s-item{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--bg2);border-radius:6px;font-size:.82rem}
.s-item .s-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-item .s-qty{color:var(--gold);font-size:.7rem;background:var(--card);padding:2px 7px;border-radius:9px}
.s-item .s-del{background:none;border:none;color:var(--fg-muted);cursor:pointer;font-size:.72rem;padding:2px;transition:color .2s}
.s-item .s-del:hover{color:var(--danger)}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;flex-shrink:0}
.modal-footer button{padding:8px 24px;border-radius:7px;border:none;cursor:pointer;font-family:inherit;font-size:.84rem;font-weight:500;transition:all .2s;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--bg)}
.modal-footer button:hover{box-shadow:0 4px 16px rgba(212,168,67,.3)}

.pwd-input{
  width:100%;background:var(--bg);border:2px solid var(--border);border-radius:10px;
  padding:14px 16px;color:var(--fg);font-size:1.1rem;font-family:inherit;outline:none;
  text-align:center;letter-spacing:4px;transition:border-color .3s;
}
.pwd-input:focus{border-color:var(--gold)}
.pwd-input.shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.pwd-error{color:var(--danger);font-size:.8rem;min-height:20px;text-align:center;margin-top:6px}
.pwd-submit{
  width:100%;margin-top:10px;padding:12px;border-radius:10px;border:none;cursor:pointer;
  font-family:inherit;font-size:.95rem;font-weight:600;transition:all .2s;
  background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--bg);
}
.pwd-submit:hover{box-shadow:0 4px 16px rgba(212,168,67,.3)}
</style>
</head>
<body>

<div class="bg-effects"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<canvas class="confetti-canvas" id="confettiCanvas"></canvas>
<div class="toast-container" id="toastContainer"></div>

<!-- Modal Mật khẩu -->
<div class="modal-overlay" id="modalPassword">
  <div class="modal" style="max-width:380px">
    <div class="modal-top">
      <h3><i class="fas fa-lock" style="margin-right:6px"></i>Xác thực</h3>
      <button class="modal-close" onclick="closePasswordModal()"><i class="fas fa-times"></i></button>
    </div>
    <div style="padding:20px">
      <p style="font-size:.85rem;color:var(--fg-muted);margin-bottom:14px;text-align:center">Nhập mật khẩu để truy cập cài đặt</p>
      <input type="password" class="pwd-input" id="passwordInput" placeholder="••••••••••" onkeydown="if(event.key==='Enter')checkPassword()">
      <p class="pwd-error" id="passwordError"></p>
      <button class="pwd-submit" onclick="checkPassword()"><i class="fas fa-unlock" style="margin-right:6px"></i>Vào cài đặt</button>
    </div>
  </div>
</div>

<!-- Modal Cài đặt -->
<div class="modal-overlay" id="modalSettings">
  <div class="modal">
    <div class="modal-top">
      <h3><i class="fas fa-cog" style="margin-right:6px"></i>Cài đặt</h3>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchTab('general',this)">Chung</button>
      <button class="modal-tab" onclick="switchTab('prizes',this)">Giải thưởng</button>
      <button class="modal-tab" onclick="switchTab('customers',this)">Khách hàng</button>
    </div>
    <div class="tab-content active" id="tabGeneral">
      <div class="title-setting">
        <label><i class="fas fa-heading" style="margin-right:5px"></i>Tiêu đề chương trình</label>
        <input type="text" id="sTitleInput" value="CHƯƠNG TRÌNH QUAY SỐ" oninput="updateTitle()">
      </div>
      <div class="title-setting">
        <label><i class="fas fa-pen-fancy" style="margin-right:5px"></i>Tiêu đề phụ (trên máy quay)</label>
        <input type="text" id="sSubTitleInput" value="QUAY SỐ MAY MẮN" oninput="updateSubTitle()">
      </div>
    </div>
    <div class="tab-content" id="tabPrizes">
      <div class="form-row">
        <input type="text" id="sPrizeName" placeholder="Tên giải thưởng..." onkeydown="if(event.key==='Enter')addPrizeFromSettings()">
        <input type="number" class="qty-input" id="sPrizeQty" placeholder="SL" min="1" value="1">
        <button class="add-btn" onclick="addPrizeFromSettings()"><i class="fas fa-plus"></i></button>
      </div>
      <div class="settings-list" id="sPrizeList"></div>
    </div>
    <div class="tab-content" id="tabCustomers">
      <div class="form-row">
        <input type="text" id="sCustomerName" placeholder="Tên khách hàng..." onkeydown="if(event.key==='Enter')addCustomerFromSettings()">
        <button class="add-btn" onclick="addCustomerFromSettings()"><i class="fas fa-plus"></i></button>
      </div>
      <textarea id="sCustomerBatch" placeholder="Hoặc nhập nhanh, mỗi dòng một tên..." style="width:100%;height:70px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:9px;color:var(--fg);font-family:inherit;font-size:.82rem;resize:none;outline:none"></textarea>
      <button style="align-self:flex-end;background:var(--gold-dark);color:var(--fg);border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-family:inherit;font-size:.78rem;transition:all .2s" onmouseover="this.style.background='var(--gold)';this.style.color='var(--bg)'" onmouseout="this.style.background='var(--gold-dark)';this.style.color='var(--fg)'" onclick="batchCustomersFromSettings()">Nhập tất cả</button>
      <div class="settings-list" id="sCustomerList"></div>
    </div>
    <div class="modal-footer"><button onclick="closeModal()">Xong</button></div>
  </div>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-top">
      <h1>QUAY SỐ MAY MẮN</h1>
      <button class="gear-btn" onclick="openPasswordModal()" title="Cài đặt"><i class="fas fa-cog"></i></button>
    </div>
    <div class="panel-section">
      <div class="panel-header"><h2><i class="fas fa-gift"></i> Giải thưởng</h2></div>
      <div class="prize-list-wrap" id="prizeListWrap"></div>
      <div class="panel-count"><span>Tổng: <span class="cnt" id="prizeCount">0</span></span><span>Còn: <span class="cnt" id="prizeRemain">0</span></span></div>
    </div>
    <div class="panel-section customer-section">
      <div class="panel-header"><h2><i class="fas fa-users"></i> Khách hàng</h2></div>
      <div class="customer-scroll-wrap" id="customerScrollWrap">
        <div class="customer-scroll-track" id="customerTrack"></div>
      </div>
      <div class="panel-count"><span>Tổng: <span class="cnt" id="customerCount">0</span></span><span>Còn: <span class="cnt" id="customerRemain">0</span></span></div>
    </div>
  </aside>

  <main class="main-area">
    <div class="main-title-top" id="mainTitleTop">CHƯƠNG TRÌNH QUAY SỐ</div>
    <div class="draw-stage">
      <div class="slot-machine" id="slotMachine">
        <div class="machine-title" id="machineTitle">QUAY SỐ MAY MẮN</div>
        <div class="slot-viewport" id="slotViewport">
          <div class="slot-highlight"></div>
          <div class="slot-fade-top"></div>
          <div class="slot-fade-bottom"></div>
          <div class="slot-track" id="slotTrack"></div>
          <button class="draw-btn-overlay" id="drawBtnOverlay">QUAY SỐ</button>
        </div>
        <div class="machine-prize" id="machinePrize"></div>
      </div>
    </div>
    <div class="results-section">
      <div class="results-header">
        <h3><i class="fas fa-trophy"></i> Kết quả</h3>
        <button onclick="clearResults()"><i class="fas fa-trash-alt"></i> Xoá</button>
      </div>
      <div class="results-list" id="resultsList"></div>
    </div>
  </main>
</div>

<script>
let customers=[],prizes=[],results=[];
let wonCustomerIds=new Set(),wonPrizeIds=new Set();
let selectedPrizeId=null,isSpinning=false,idCounter=0;
const ITEM_H=68,VISIBLE=5,CENTER=2,MARGIN=3;
const CS_ITEM_H=38;
const SPIN_DURATION=6000;
const SETTINGS_PASSWORD='0969774224';

const sampleCustomers=[
  'Nguyễn Minh Anh','Trần Đức Anh','Lê Thu Hương','Phạm Văn Bình',
  'Hoàng Thị Cẩm','Vũ Đình Công','Đặng Minh Đức','Bùi Thị Hoa',
  'Ngô Quang Huy','Lý Thị Lan','Trịnh Văn Mạnh','Phan Thị Nga',
  'Đỗ Quốc Phong','Hồ Thị Quỳnh','Dương Văn Sơn','Vũ Thị Trang',
  'Lưu Hoàng Long','Tạ Minh Khôi','Cao Thị Yến','Trần Văn Đạt',
  'Phạm Thị Ngọc','Võ Hoàng Nam','Nguyễn Thanh Tùng','Lê Thị Diệu',
  'Hoàng Văn Kiên','Đào Thị Mai','Mai Văn Tuấn','Lý Hoàng Anh'
];
const samplePrizes=[
  {name:'iPhone 15 Pro Max',qty:1},{name:'Samsung Galaxy S24 Ultra',qty:1},
  {name:'TV OLED 55 inch',qty:1},{name:'Laptop MacBook Air M3',qty:1},
  {name:'AirPods Pro 2',qty:2},{name:'Voucher 5.000.000đ',qty:2},
  {name:'Voucher 2.000.000đ',qty:3},{name:'Loa JBL Charge 5',qty:1},
  {name:'Apple Watch Series 9',qty:1},{name:'Balo High-end',qty:3}
];

function initData(){
  sampleCustomers.forEach(n=>customers.push({id:++idCounter,name:n}));
  samplePrizes.forEach(p=>prizes.push({id:++idCounter,name:p.name,total:p.qty,remaining:p.qty}));
  renderPrizes();updateCounts();buildCustomerScroll();buildSlotItems();
}

function getAvail(){return customers.filter(c=>!wonCustomerIds.has(c.id))}

function renderPrizes(){
  const w=document.getElementById('prizeListWrap');w.innerHTML='';
  prizes.forEach((p,i)=>{
    const isWon=p.remaining<=0,isSel=selectedPrizeId===p.id;
    const div=document.createElement('div');
    div.className='list-item prize-item'+(isWon?' won':'')+(isSel?' selected-prize':'');
    div.style.cursor=isWon?'default':'pointer';
    div.innerHTML=`<span class="item-num">${isWon?'<i class="fas fa-check" style="font-size:.48rem"></i>':(i+1)}</span><span class="item-name" title="${p.name}">${p.name}</span><span class="item-qty">x${p.remaining}</span>`;
    if(!isWon)div.onclick=()=>selectPrize(p.id);
    w.appendChild(div);
  });
}

function buildCustomerScroll(){
  const track=document.getElementById('customerTrack'),avail=getAvail();
  track.innerHTML='';let ds=document.getElementById('csStyle');if(ds)ds.remove();
  if(!avail.length){track.innerHTML='<div class="cs-item" style="justify-content:center;opacity:.3;padding:20px"><span class="cs-name">Chưa có khách hàng</span></div>';return}
  for(let r=0;r<3;r++){avail.forEach((c,i)=>{const d=document.createElement('div');d.className='cs-item';d.setAttribute('data-cid',c.id);d.innerHTML=`<span class="cs-num">${i+1}</span><span class="cs-name">${c.name}</span>`;track.appendChild(d)})}
  const oneH=avail.length*CS_ITEM_H,dur=avail.length*1.4;
  ds=document.createElement('style');ds.id='csStyle';
  ds.textContent=`@keyframes csScroll{from{transform:translateY(0)}to{transform:translateY(${-oneH}px)}}`;
  document.head.appendChild(ds);track.style.animation=`csScroll ${dur}s linear infinite`;
}

function highlightCustomerScroll(wid){
  const track=document.getElementById('customerTrack');track.style.animationPlayState='paused';
  track.querySelectorAll(`[data-cid="${wid}"]`).forEach(el=>el.classList.add('winner-flash'));
  setTimeout(()=>buildCustomerScroll(),3500);
}

function updateCounts(){
  document.getElementById('customerCount').textContent=customers.length;
  document.getElementById('customerRemain').textContent=customers.length-wonCustomerIds.size;
  const tp=prizes.reduce((s,p)=>s+p.total,0),rp=prizes.reduce((s,p)=>s+p.remaining,0);
  document.getElementById('prizeCount').textContent=tp;
  document.getElementById('prizeRemain').textContent=rp;
  const btn=document.getElementById('drawBtnOverlay');
  const avail=getAvail();
  if(!selectedPrizeId||!avail.length){btn.disabled=true;btn.classList.add('is-hidden')}
  else{btn.disabled=false;if(!isSpinning)btn.classList.remove('is-hidden')}
}

function selectPrize(id){if(prizes.find(p=>p.id===id).remaining<=0)return;selectedPrizeId=selectedPrizeId===id?null:id;renderPrizes();updateCounts();const btn=document.getElementById('drawBtnOverlay');if(selectedPrizeId&&!isSpinning){btn.classList.remove('is-hidden');btn.disabled=false}}

function updateTitle(){const val=document.getElementById('sTitleInput').value.trim()||'CHƯƠNG TRÌNH QUAY SỐ';document.getElementById('mainTitleTop').textContent=val.toUpperCase()}
function updateSubTitle(){const val=document.getElementById('sSubTitleInput').value.trim()||'QUAY SỐ MAY MẮN';document.getElementById('machineTitle').textContent=val.toUpperCase()}

// ===== MẬT KHẨU =====
function openPasswordModal(){
  document.getElementById('modalPassword').classList.add('active');
  document.getElementById('passwordInput').value='';
  document.getElementById('passwordError').textContent='';
  setTimeout(()=>document.getElementById('passwordInput').focus(),150);
}
function closePasswordModal(){document.getElementById('modalPassword').classList.remove('active')}

function checkPassword(){
  const inp=document.getElementById('passwordInput');
  const err=document.getElementById('passwordError');
  if(inp.value===SETTINGS_PASSWORD){
    closePasswordModal();
    openSettings('general');
  }else{
    err.textContent='Mật khẩu không đúng!';
    inp.style.borderColor='var(--danger)';
    inp.classList.remove('shake');
    void inp.offsetHeight;
    inp.classList.add('shake');
    setTimeout(()=>{inp.style.borderColor='';inp.classList.remove('shake')},500);
  }
}

function openSettings(tab){
  document.getElementById('modalSettings').classList.add('active');
  const tabs=document.querySelectorAll('.modal-tab');
  let idx=0;if(tab==='prizes')idx=1;else if(tab==='customers')idx=2;
  switchTab(['general','prizes','customers'][idx],tabs[idx]);
  renderSettingsPrizes();renderSettingsCustomers();
  document.getElementById('sTitleInput').value=document.getElementById('mainTitleTop').textContent;
  document.getElementById('sSubTitleInput').value=document.getElementById('machineTitle').textContent;
}
function closeModal(){document.getElementById('modalSettings').classList.remove('active')}

function switchTab(tab,btn){
  document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const map={general:'tabGeneral',prizes:'tabPrizes',customers:'tabCustomers'};
  document.getElementById(map[tab]).classList.add('active');
}

function renderSettingsPrizes(){
  const l=document.getElementById('sPrizeList');l.innerHTML='';
  prizes.forEach(p=>{const d=document.createElement('div');d.className='s-item';d.innerHTML=`<span class="s-name">${p.name}</span><span class="s-qty">x${p.total}</span><button class="s-del" onclick="removePrizeS(${p.id})"><i class="fas fa-trash-alt"></i></button>`;l.appendChild(d)});
}
function renderSettingsCustomers(){
  const l=document.getElementById('sCustomerList');l.innerHTML='';
  customers.forEach(c=>{const d=document.createElement('div');d.className='s-item';d.innerHTML=`<span class="s-name">${c.name}</span><button class="s-del" onclick="removeCustomerS(${c.id})"><i class="fas fa-trash-alt"></i></button>`;l.appendChild(d)});
}

function addPrizeFromSettings(){
  const n=document.getElementById('sPrizeName'),q=document.getElementById('sPrizeQty');
  const name=n.value.trim(),qty=parseInt(q.value)||1;if(!name)return;
  prizes.push({id:++idCounter,name,total:qty,remaining:qty});n.value='';q.value='1';
  renderSettingsPrizes();renderPrizes();updateCounts();buildSlotItems();showToast('Đã thêm giải: '+name,'success');
}
function addCustomerFromSettings(){
  const e=document.getElementById('sCustomerName'),name=e.value.trim();if(!name)return;
  customers.push({id:++idCounter,name});e.value='';
  renderSettingsCustomers();updateCounts();buildCustomerScroll();buildSlotItems();showToast('Đã thêm: '+name,'success');
}
function batchCustomersFromSettings(){
  const e=document.getElementById('sCustomerBatch'),text=e.value.trim();if(!text)return;
  const names=text.split('\n').map(s=>s.trim()).filter(Boolean);if(!names.length)return;
  names.forEach(n=>customers.push({id:++idCounter,name:n}));e.value='';
  renderSettingsCustomers();updateCounts();buildCustomerScroll();buildSlotItems();showToast('Đã thêm '+names.length+' khách hàng','success');
}
function removePrizeS(id){if(wonPrizeIds.has(id))return;if(selectedPrizeId===id)selectedPrizeId=null;prizes=prizes.filter(p=>p.id!==id);renderSettingsPrizes();renderPrizes();updateCounts();buildSlotItems()}
function removeCustomerS(id){if(wonCustomerIds.has(id))return;customers=customers.filter(c=>c.id!==id);renderSettingsCustomers();updateCounts();buildCustomerScroll();buildSlotItems()}

function buildSlotItems(){
  const track=document.getElementById('slotTrack');
  track.innerHTML='';track.style.transition='none';track.style.transform='translateY(0)';
  const avail=getAvail();
  const sizes=['sz-2','sz-1','sz-center','sz-1','sz-2'];
  if(!avail.length){for(let i=0;i<5;i++){const d=document.createElement('div');d.className='slot-item '+sizes[i];d.textContent=i===CENTER?'?':'';track.appendChild(d)}return}
  const picked=[];for(let i=0;i<5;i++)picked.push(avail[Math.floor(Math.random()*avail.length)]);
  picked.forEach((c,i)=>{const d=document.createElement('div');d.className='slot-item '+sizes[i];d.textContent=c.name;track.appendChild(d)});
}

// ===== QUAY SỐ - XÁC SUẤT CHIA ĐỀU =====
// Sử dụng Math.random() nhân với độ dài mảng và làm tròn xuống
// => Mỗi khách hàng có xác suất trúng đúng 1/N (N = số khách còn lại)
function getUniformRandomIndex(arrayLength){
  return Math.floor(Math.random()*arrayLength);
}

function startDraw(){
  if(isSpinning||!selectedPrizeId)return;
  const avail=getAvail();
  if(!avail.length){showToast('Không còn khách hàng!','error');return}

  isSpinning=true;
  const machine=document.getElementById('slotMachine');
  const track=document.getElementById('slotTrack');
  const btn=document.getElementById('drawBtnOverlay');
  const prizeEl=document.getElementById('machinePrize');

  machine.classList.add('spinning');machine.classList.remove('won');
  btn.classList.add('is-hidden');

  const prize=prizes.find(p=>p.id===selectedPrizeId);
  prizeEl.innerHTML='<i class="fas fa-gift" style="margin-right:5px;font-size:.9rem"></i>'+prize.name;

  // Chọn người trúng với xác suất đều (Uniform Distribution)
  const winnerIdx=getUniformRandomIndex(avail.length);
  const winner=avail[winnerIdx];
  const n=avail.length;
  const u2=avail[(winnerIdx+2)%n],u1=avail[(winnerIdx+1)%n];
  const p1=avail[(winnerIdx-1+n)%n],p2=avail[(winnerIdx-2+n)%n];

  const loops=4+Math.floor(Math.random()*2);
  track.innerHTML='';

  for(let i=0;i<MARGIN;i++){const d=document.createElement('div');d.className='slot-item sz-spin';d.textContent='';track.appendChild(d)}
  for(let l=0;l<loops;l++){for(let c=0;c<avail.length;c++){const d=document.createElement('div');d.className='slot-item sz-spin';d.textContent=avail[c].name;track.appendChild(d)}}
  const eu2=document.createElement('div');eu2.className='slot-item sz-2';eu2.textContent=u2.name;track.appendChild(eu2);
  const eu1=document.createElement('div');eu1.className='slot-item sz-1';eu1.textContent=u1.name;track.appendChild(eu1);
  const wd=document.createElement('div');wd.className='slot-item sz-center';wd.textContent=winner.name;track.appendChild(wd);
  const ep1=document.createElement('div');ep1.className='slot-item sz-1';ep1.textContent=p1.name;track.appendChild(ep1);
  const ep2=document.createElement('div');ep2.className='slot-item sz-2';ep2.textContent=p2.name;track.appendChild(ep2);
  for(let i=0;i<MARGIN;i++){const d=document.createElement('div');d.className='slot-item sz-spin';d.textContent='';track.appendChild(d)}

  const winItemIdx=MARGIN+loops*avail.length+2;
  const targetY=-(winItemIdx-CENTER)*ITEM_H;

  track.style.transition='none';track.style.transform='translateY(0)';
  void track.offsetHeight;

  track.style.transition='transform '+SPIN_DURATION+'ms cubic-bezier(0.08,0.82,0.17,1)';
  track.style.transform='translateY('+targetY+'px)';

  setTimeout(()=>{
    machine.classList.remove('spinning');machine.classList.add('won');
    highlightCustomerScroll(winner.id);

    wonCustomerIds.add(winner.id);
    prize.remaining--;
    if(prize.remaining<=0)wonPrizeIds.add(prize.id);

    results.unshift({customer:winner.name,prize:prize.name});
    renderResults();renderPrizes();

    selectedPrizeId=null;
    const next=prizes.find(p=>p.remaining>0);
    if(next){selectedPrizeId=next.id;renderPrizes()}

    updateCounts();isSpinning=false;
    launchConfetti();
    showToast(winner.name+' trúng '+prize.name+'!','success');

    setTimeout(()=>{
      if(!isSpinning){
        btn.textContent=next?'QUAY TIẾP':'QUAY SỐ';
        btn.classList.remove('is-hidden');
        btn.disabled=!next;
      }
    },2500);
  },SPIN_DURATION+200);
}

document.getElementById('drawBtnOverlay').addEventListener('click',startDraw);

function renderResults(){
  const list=document.getElementById('resultsList');
  if(!results.length){list.innerHTML='';return}
  list.innerHTML='';
  results.forEach((r,i)=>{
    const d=document.createElement('div');d.className='result-card';
    d.innerHTML=`<span class="r-order">${results.length-i}</span><span class="r-text">${r.customer} <span class="r-prize-inline">- ${r.prize}</span></span>`;
    list.appendChild(d);
  });
}
function clearResults(){
  results=[];wonCustomerIds.clear();wonPrizeIds.clear();
  prizes.forEach(p=>p.remaining=p.total);selectedPrizeId=null;
  document.getElementById('machinePrize').innerHTML='';
  document.getElementById('slotMachine').classList.remove('won');
  renderPrizes();renderResults();updateCounts();buildCustomerScroll();buildSlotItems();
  showToast('Đã xoá tất cả kết quả','success');
}

const cCanvas=document.getElementById('confettiCanvas'),cCtx=cCanvas.getContext('2d');
let cParts=[],cRunning=false;
function resizeC(){cCanvas.width=innerWidth;cCanvas.height=innerHeight}addEventListener('resize',resizeC);resizeC();
function launchConfetti(){
  cParts=[];const colors=['#f5d870','#ffe066','#3b82f6','#3dd68c','#ff6b35','#ffffff','#d4a843','#60a5fa','#ffd700'];
  for(let i=0;i<220;i++)cParts.push({x:Math.random()*cCanvas.width,y:-20-Math.random()*280,w:4+Math.random()*7,h:3+Math.random()*5,color:colors[Math.floor(Math.random()*colors.length)],vx:(Math.random()-.5)*6,vy:2.5+Math.random()*3.5,rot:Math.random()*360,rotS:(Math.random()-.5)*11,opacity:1,shape:Math.random()>.5?'rect':'circle'});
  if(!cRunning){cRunning=true;animC()}
}
function animC(){
  cCtx.clearRect(0,0,cCanvas.width,cCanvas.height);let alive=false;
  cParts.forEach(p=>{if(p.opacity<=0)return;alive=true;p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.vx*=.99;p.rot+=p.rotS;if(p.y>cCanvas.height-50)p.opacity-=.02;cCtx.save();cCtx.globalAlpha=Math.max(0,p.opacity);cCtx.translate(p.x,p.y);cCtx.rotate(p.rot*Math.PI/180);cCtx.fillStyle=p.color;if(p.shape==='rect')cCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);else{cCtx.beginPath();cCtx.arc(0,0,Math.max(1,p.w/2),0,Math.PI*2);cCtx.fill()}cCtx.restore()});
  if(alive)requestAnimationFrame(animC);else{cRunning=false;cCtx.clearRect(0,0,cCanvas.width,cCanvas.height)}
}

function showToast(msg,type='success'){
  const c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast '+type;
  const icon=type==='success'?'fa-check-circle':'fa-exclamation-circle';
  t.innerHTML='<i class="fas '+icon+'"></i> '+msg;c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(30px)';t.style.transition='all .3s';setTimeout(()=>t.remove(),300)},2800);
}

document.getElementById('modalPassword').addEventListener('click',e=>{if(e.target.id==='modalPassword')closePasswordModal()});
document.getElementById('modalSettings').addEventListener('click',e=>{if(e.target.id==='modalSettings')closeModal()});

initData();
</script>
</body>
</html>
